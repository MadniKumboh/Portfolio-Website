name: Linting Pipeline

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install --save-dev htmlhint stylelint stylelint-config-standard
      
    - name: Run HTMLHint
      run: npx htmlhint "src/**/*.html"
      
    - name: Run Stylelint
      run: npx stylelint "styles/**/*.css"
